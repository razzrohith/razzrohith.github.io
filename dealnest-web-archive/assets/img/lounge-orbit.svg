<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 760" role="img" aria-labelledby="title desc">
  <title id="title">Abstract game lounge interface</title>
  <desc id="desc">Layered glass panels, tokens, and game paths used as a premium visual for the temporary game lounge.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10232d"/>
      <stop offset=".55" stop-color="#193b44"/>
      <stop offset="1" stop-color="#0b1016"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe0a6"/>
      <stop offset=".45" stop-color="#c8942c"/>
      <stop offset="1" stop-color="#8b5d18"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9ff5cb"/>
      <stop offset="1" stop-color="#2f6f73"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#000" flood-opacity=".34"/>
    </filter>
  </defs>
  <rect width="900" height="760" rx="70" fill="url(#bg)"/>
  <circle cx="690" cy="132" r="150" fill="#6dbcb5" opacity=".18"/>
  <circle cx="140" cy="602" r="190" fill="#c8942c" opacity=".16"/>
  <g filter="url(#shadow)">
    <rect x="118" y="100" width="664" height="500" rx="42" fill="#ffffff" opacity=".12" stroke="#fff" stroke-opacity=".24"/>
    <rect x="170" y="150" width="560" height="96" rx="28" fill="#ffffff" opacity=".16"/>
    <rect x="170" y="280" width="250" height="260" rx="32" fill="#ffffff" opacity=".13"/>
    <rect x="456" y="280" width="274" height="260" rx="32" fill="#ffffff" opacity=".13"/>
  </g>
  <path d="M214 444 C310 310, 466 610, 660 376" fill="none" stroke="url(#mint)" stroke-width="26" stroke-linecap="round"/>
  <path d="M244 470 C336 370, 452 560, 630 392" fill="none" stroke="#ffffff" stroke-width="5" stroke-opacity=".52" stroke-linecap="round"/>
  <g>
    <circle cx="230" cy="444" r="42" fill="url(#gold)"/>
    <circle cx="420" cy="528" r="42" fill="#4f7fd9"/>
    <circle cx="642" cy="374" r="42" fill="#d14c3f"/>
    <circle cx="230" cy="444" r="18" fill="#fff" opacity=".28"/>
    <circle cx="420" cy="528" r="18" fill="#fff" opacity=".25"/>
    <circle cx="642" cy="374" r="18" fill="#fff" opacity=".25"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" font-weight="800">
    <text x="212" y="207" fill="#fff" font-size="44">Play while we build</text>
    <text x="214" y="365" fill="#fff" font-size="66">A K Q</text>
    <text x="502" y="360" fill="#fff" font-size="34" opacity=".9">ROOM</text>
    <text x="502" y="416" fill="#fff" font-size="84">4173</text>
  </g>
</svg>
