<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Play a polished local Snake game with speed and wall mode controls.">
  <title>Snake | Razz Rohith Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/game-shell.css">
</head>

<body class="snake-body">
  <div class="site-progress" aria-hidden="true"></div>
  <main class="snake-layout">
    <header class="snake-topbar" data-reveal>
      <a class="button secondary" href="../">Back to lounge</a>
      <div class="snake-title">
        <span class="snake-mark" aria-hidden="true"></span>
        <div>
          <h1>Snake</h1>
          <p>Eat, grow, pause, restart, and chase the high score.</p>
        </div>
      </div>
      <button class="icon-button" id="pauseBtn" type="button">Pause</button>
    </header>

    <section class="snake-main" aria-label="Snake game">
      <div class="snake-stage" data-reveal data-tilt>
        <div class="canvas-wrap">
          <canvas id="gameCanvas" width="720" height="720" aria-label="Snake game board"></canvas>
          <div class="game-overlay active" id="gameOverlay">
            <div>
              <h2 id="overlayTitle">Ready?</h2>
              <p id="overlayText">Press Start, use arrow keys or WASD, and keep moving.</p>
              <button class="button primary" id="overlayAction" type="button">Start game</button>
            </div>
          </div>
        </div>
      </div>

      <aside class="side-panel" aria-label="Game controls and stats" data-reveal>
        <div class="metrics">
          <div class="metric">
            <span class="metric-label">Score</span>
            <span class="metric-value" id="score">0</span>
          </div>
          <div class="metric">
            <span class="metric-label">Best</span>
            <span class="metric-value" id="bestScore">0</span>
          </div>
          <div class="metric">
            <span class="metric-label">Level</span>
            <span class="metric-value" id="level">1</span>
          </div>
          <div class="metric">
            <span class="metric-label">Length</span>
            <span class="metric-value" id="length">3</span>
          </div>
        </div>

        <div class="control-group">
          <label>Speed</label>
          <div class="segmented" role="group" aria-label="Speed">
            <button type="button" data-speed="easy">Easy</button>
            <button type="button" data-speed="normal" class="active">Normal</button>
            <button type="button" data-speed="fast">Fast</button>
          </div>
        </div>

        <div class="control-group">
          <label>Wall rules</label>
          <button class="mode-toggle" id="wrapToggle" type="button" aria-pressed="false">
            Classic walls
          </button>
        </div>

        <div class="action-row">
          <button class="button primary" id="startBtn" type="button">Start</button>
          <button class="button secondary" id="restartBtn" type="button">Restart</button>
        </div>

        <div>
          <p class="instructions-title">Controls</p>
          <p class="instructions">Use arrow keys, WASD, swipe on the board, or the D-pad on smaller screens.</p>
          <div class="kbd-row" aria-hidden="true">
            <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd><kbd>Space</kbd>
          </div>
        </div>
      </aside>
    </section>

    <section class="mobile-controls" aria-label="Touch controls" data-reveal>
      <div class="dpad">
        <span class="empty"></span>
        <button type="button" data-dir="up" aria-label="Move up">Up</button>
        <span class="empty"></span>
        <button type="button" data-dir="left" aria-label="Move left">Left</button>
        <button type="button" data-dir="pause" aria-label="Pause game">Stop</button>
        <button type="button" data-dir="right" aria-label="Move right">Right</button>
        <span class="empty"></span>
        <button type="button" data-dir="down" aria-label="Move down">Down</button>
        <span class="empty"></span>
      </div>
    </section>
  </main>

  <script src="../assets/js/snake-game.js"></script>
  <script src="../assets/js/site-motion.js"></script>
</body>

</html>
