<!DOCTYPE html>
<html>

<body>
    <img id="img" src="assets/reference.jpg" style="cursor:crosshair; max-width: none;"
        onclick="let info = `X: ${event.offsetX}, Y: ${event.offsetY}`; console.log(info); document.getElementById('out').innerHTML += info + '<br>';">
    <div id="out"
        style="position:fixed; top:10px; right:10px; background:white; padding:10px; z-index:999; font-size:24px;">
    </div>
    <script>
        window.onload = () => {
            let img = document.getElementById('img');
            console.log(`Image size: ${img.naturalWidth} x ${img.naturalHeight}`);
            document.getElementById('out').innerHTML += `Size: ${img.naturalWidth}x${img.naturalHeight}<br>`;
        };
    </script>
</body>

</html>
