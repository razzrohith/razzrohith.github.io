<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sequence Board Game</title>
  <link rel="stylesheet" href="style.css">
  <!-- Anime.js for smooth animations -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <!-- Canvas Confetti for sequence celebrations -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>

<body>
  <!-- Home / Lobby Selection -->
  <div id="home" class="screen active">
    <h1>Sequence</h1>
    <img src="board_preview.png" alt="Sequence Board Preview"
      style="width:100%;max-width:360px;border-radius:16px;margin:0 auto 20px;display:block;box-shadow:0 8px 32px rgba(0,0,0,.5);">
    <div id="homeError" class="error"></div>
    <div class="lobby-inputs">
      <input type="text" id="nameInput" placeholder="Enter your name"
        style="margin-bottom: 10px; padding: 10px; width: 100%; box-sizing: border-box; font-size: 16px;">
      <button id="createBtn" style="width: 100%; margin-bottom: 15px;">Create Room</button>
      <div class="join" style="display: flex; gap: 10px;">
        <input type="text" id="roomInput" placeholder="Room code" maxlength="4"
          style="flex: 1; padding: 10px; font-size: 16px;">
        <button id="joinBtn" style="padding: 10px 20px;">Join</button>
      </div>
    </div>
    <!-- Rejoin section (shown only when localStorage has a saved session) -->
    <div id="rejoinSection"
      style="display:none;margin-top:20px;padding:14px;border:1px solid #4a4;border-radius:12px;background:rgba(0,180,0,.08);text-align:center;">
      <p style="margin-bottom:10px;font-size:.9rem;">You were in a game! Rejoin?</p>
      <button id="rejoinBtn" style="padding:8px 24px;">Rejoin Game</button>
      <button id="dismissRejoin" style="padding:8px 16px;margin-left:10px;background:#555;">Dismiss</button>
    </div>
  </div>

  <!-- Lobby screen -->
  <div id="lobby" class="screen">
    <h2>Lobby</h2>
    <div class="lobby-header">
      <div>
        <span>Room: </span><span id="roomCode" class="room-code"></span>
      </div>
      <div>
        <button id="copyBtn" class="sm">Copy Code</button>
        <span id="copyMsg" class="msg"></span>
      </div>
    </div>

    <div id="playerList" class="player-list"></div>

    <div class="lobby-controls">
      <button id="readyBtn">Ready</button>
      <button id="startBtn" class="primary hidden">Start Game</button>
    </div>

    <div id="lobbyError" class="error"></div>

    <div class="lobby-footer">
      <button id="leaveLobbyBtn">Leave</button>
    </div>
  </div>

  <!-- Game screen -->
  <div id="game" class="screen">
    <!-- Disconnect / Pause Overlay -->
    <div id="pauseOverlay"
      style="display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;">
      <div
        style="background:#1a1a2e;border:2px solid #f5c518;border-radius:24px;padding:40px 32px;text-align:center;max-width:360px;">
        <div style="font-size:3rem;margin-bottom:12px;">⏸️</div>
        <h2 style="color:#f5c518;margin-bottom:10px;">Game Paused</h2>
        <p id="pauseMessage" style="color:#ccc;font-size:1rem;line-height:1.5;">A player disconnected. Waiting for them
          to reconnect...</p>
      </div>
    </div>

    <div class="game-header" id="statusBar">
      <div id="winCount" class="scoreboard"></div>

      <div id="turnContainer" style="display:flex;flex-direction:column;align-items:center;gap:6px;">
        <span id="currentPlayer" class="turn-indicator"></span>
        <div id="recentCardContainer"
          style="display:flex;flex-direction:column;align-items:center;justify-content:center;">
          <span
            style="font-size:0.7rem;color:rgba(255,255,255,.6);text-transform:uppercase;font-weight:bold;letter-spacing:.06em;">Last
            Played</span>
          <div id="lastPlayedCard"
            style="display:flex;align-items:center;justify-content:center;margin-top:2px;min-height:40px;">
            <!--filled by JS--></div>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
        <div id="gameCodeBadge" style="font-size:.72rem;color:rgba(255,255,255,.55);letter-spacing:.06em;">Room: <strong
            id="gameCodeDisplay" style="color:#f5c518;"></strong></div>
        <button id="leaveGameBtn" class="sm">Leave Game</button>
      </div>
    </div>

    <!-- In-game players list -->
    <div id="gamePlayersList" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:8px;">
    </div>

    <div class="board-container">
      <div class="board-frame">
        <div class="board-title">✦ &nbsp; S E Q U E N C E &nbsp; ✦</div>
        <div id="board"></div>
      </div>
    </div>

    <div class="hand-container">
      <h3 class="hand-title">Your Hand</h3>
      <div id="hand"></div>
    </div>
  </div>

  <!-- End screen -->
  <div id="end" class="screen">
    <h2>Game Over</h2>
    <p id="winnerText"></p>
    <p id="winnerSubtext"></p>
    <button id="playAgainBtn">Play Again</button>
    <button id="backLobbyBtn">Back to Lobby</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/client.js"></script>
</body>

</html>
