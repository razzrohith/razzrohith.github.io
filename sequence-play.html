<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Launch the hosted Sequence multiplayer game.">
  <title>Sequence | Razz Rohith Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/game-shell.css">
</head>

<body class="launcher-body">
  <div class="site-progress" aria-hidden="true"></div>
  <main class="launcher-shell">
    <header class="launcher-bar" data-reveal>
      <a class="button secondary" href="./">Back to lounge</a>
      <div class="launcher-title">
        <strong>Sequence</strong>
        <small>Hosted multiplayer room server</small>
      </div>
      <a class="button primary" href="https://sequencegame-61fk.onrender.com/" target="_blank" rel="noopener">Open new tab</a>
    </header>

    <iframe
      class="launcher-frame"
      id="gameFrame"
      src="https://sequencegame-61fk.onrender.com/"
      title="Sequence multiplayer game"
      allow="fullscreen; clipboard-write; clipboard-read"
      loading="eager"></iframe>

    <section class="loading-panel" id="loadingPanel" aria-live="polite">
      <div class="loading-card" data-reveal>
        <div class="spinner" aria-hidden="true"></div>
        <p class="eyebrow">Connecting</p>
        <h1 style="font-size:2rem;line-height:1.05;margin:8px 0 10px;">Waking the Sequence table</h1>
        <p style="color:var(--muted);line-height:1.6;margin:0;">The first visit can take a short moment while the hosted server starts.</p>
      </div>
    </section>
  </main>

  <script src="./assets/js/remote-launcher.js"></script>
  <script src="./assets/js/site-motion.js"></script>
</body>

</html>
